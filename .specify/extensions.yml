installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: false
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification (disabled - specs belong
      on main)
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: github-issues
    command: speckit.github-issues.create
    enabled: true
    optional: false
    prompt: Execute speckit.github-issues.create?
    description: Auto-create the GitHub Issue after a new spec is written.
    condition: null
  after_clarify:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to clarify?
    description: Transition the feature Issue to status:clarify.
    args:
      status: clarify
    condition: null
  after_plan:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to plan?
    description: Transition the feature Issue to status:plan.
    args:
      status: plan
    condition: null
  after_tasks:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to tasks?
    description: Transition the feature Issue to status:tasks.
    args:
      status: tasks
    condition: null
  after_implement:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to implement?
    description: Transition the feature Issue to status:implement.
    args:
      status: implement
    condition: null
  - extension: bugfix
    command: speckit.bugfix.verify
    enabled: true
    optional: false
    prompt: Run bugfix consistency check after implementation?
    description: Verify spec artifact consistency after implementation completes
    condition: null
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: false
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  - extension: git
    command: speckit.git.test
    enabled: true
    optional: false
    prompt: Run unit and UI tests to verify implementation?
    description: Run test suites as final implementation quality gate
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
