installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Create the feature branch before writing the spec?
    description: Create feature branch before specification (branch protection requires
      PRs for every change to main, including spec files; this hook gives every feature
      its own branch from /speckit.specify onwards).
    condition: null
  after_specify:
  - extension: github-issues
    command: speckit.github-issues.create
    enabled: true
    optional: false
    prompt: Create GitHub Issue for this feature?
    description: Auto-create the canonical feature Issue (replaces BACKLOG.md row
      append).
    condition: null
  - extension: publish
    command: speckit.publish.run
    enabled: true
    optional: false
    prompt: Commit spec.md + push + open draft PR?
    description: Commit spec.md, push branch, open draft PR.
    args:
      phase: specify
    condition: null
  after_clarify:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to clarify?
    description: Transition the feature Issue to status:clarify.
    args:
      status: clarify
    condition: null
  - extension: publish
    command: speckit.publish.run
    enabled: true
    optional: false
    prompt: Commit clarifications + push + refresh PR body?
    description: Commit clarification edits, push, refresh PR body.
    args:
      phase: clarify
    condition: null
  after_plan:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to plan?
    description: Transition the feature Issue to status:plan.
    args:
      status: plan
    condition: null
  - extension: publish
    command: speckit.publish.run
    enabled: true
    optional: false
    prompt: Commit plan + design artifacts + push + refresh PR body?
    description: Commit plan + research + data-model + quickstart + contracts, push,
      refresh PR body.
    args:
      phase: plan
    condition: null
  after_tasks:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to tasks?
    description: Transition the feature Issue to status:tasks.
    args:
      status: tasks
    condition: null
  - extension: publish
    command: speckit.publish.run
    enabled: true
    optional: false
    prompt: Commit tasks.md + push + refresh PR body?
    description: Commit tasks.md, push, refresh PR body.
    args:
      phase: tasks
    condition: null
  after_implement:
  - extension: github-issues
    command: speckit.github-issues.update-status
    enabled: true
    optional: false
    prompt: Update GitHub Issue status to implement?
    description: Transition the feature Issue to status:implement.
    args:
      status: implement
    condition: null
  - extension: git
    command: speckit.git.test
    enabled: true
    optional: false
    prompt: Run unit and UI tests to verify implementation?
    description: Run test suites as final implementation quality gate
    condition: null
  - extension: publish
    command: speckit.publish.run
    enabled: true
    optional: false
    prompt: Commit any leftovers + push + refresh PR body?
    description: Commit any leftover implement-time changes, push, refresh PR body.
    args:
      phase: implement
    condition: null
