name: Issue lifecycle (PR merge → status:done + version label)

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (needed for git describe)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest version tag
        id: version
        run: |
          # Find the most recent vX.Y.Z tag reachable from the merge commit.
          # Falls back to empty if no tag exists yet.
          tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1 || true)
          if [ -n "$tag" ]; then
            echo "label=version:${tag}" >> "$GITHUB_OUTPUT"
            echo "Resolved version label: version:${tag}"
          else
            echo "label=" >> "$GITHUB_OUTPUT"
            echo "No version tag found — skipping version label."
          fi

      - name: Update linked Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERSION_LABEL: ${{ steps.version.outputs.label }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Extract Issue references from PR body. Matches "Closes #N", "Fixes #N",
          # "Resolves #N" (case-insensitive), and the GH-style same-repo "Closes owner/repo#N"
          # is normalised to bare numbers here (cross-repo is intentionally ignored).
          issues=$(printf '%s\n' "$PR_BODY" \
            | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -u)

          if [ -z "$issues" ]; then
            echo "PR #${PR_NUMBER} has no Closes/Fixes/Resolves Issue references — nothing to update."
            exit 0
          fi

          for n in $issues; do
            echo "::group::Updating Issue #${n}"

            # Remove any existing status:* labels (regex match via jq)
            current=$(gh issue view "$n" --repo "$REPO" --json labels \
              --jq '[.labels[].name | select(startswith("status:"))] | join(",")' || echo "")
            if [ -n "$current" ]; then
              IFS=',' read -ra remove_labels <<<"$current"
              for lbl in "${remove_labels[@]}"; do
                gh issue edit "$n" --repo "$REPO" --remove-label "$lbl" || true
              done
            fi

            # Add status:done (+ version label if available)
            add_args="--add-label status:done"
            if [ -n "${VERSION_LABEL}" ]; then
              add_args="${add_args} --add-label ${VERSION_LABEL}"
            fi
            # shellcheck disable=SC2086
            gh issue edit "$n" --repo "$REPO" ${add_args}

            # Close the issue if still open
            state=$(gh issue view "$n" --repo "$REPO" --json state --jq '.state')
            if [ "$state" = "OPEN" ]; then
              gh issue close "$n" --repo "$REPO" --reason completed --comment "Closed by PR #${PR_NUMBER} merge."
            fi

            echo "::endgroup::"
          done
