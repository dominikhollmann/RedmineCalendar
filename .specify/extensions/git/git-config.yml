# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[Spec Kit] Initial commit"

# auto-commit.sh's per-event config block has been removed.
# Feature 032's audit dropped every git.commit hook binding from .specify/extensions.yml,
# so auto-commit.sh is no longer invoked from any Spec Kit step. Explicit commits at
# logical boundaries are the project convention. If you ever want to opt back in to
# automated commits, add `auto_commit:` here AND re-bind the hook in extensions.yml —
# the binding is the load-bearing piece; this config alone has no effect.
