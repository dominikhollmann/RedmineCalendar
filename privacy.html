<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Baseline CSP (defense-in-depth, issue #117).
      connect-src is intentionally absent here — it depends on admin-configured
      proxy URLs (redmineUrl, aiProxyUrl) and must be set as a server-side
      header. See the "Content Security Policy" section in README.md.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'sha256-f7b1YAOPSc0ietZktOxGbxW1keQBQjgFgS4S1ioVfsY='; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; object-src 'none'; base-uri 'self';"
    />
    <script>
      // Feature 030: apply dark theme on first paint, before any stylesheet
      // loads. Must remain inline so it runs before the browser paints.
      try {
        var t = localStorage.getItem('redmine_calendar_theme');
        if (t === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch (e) {
        /* localStorage unavailable — fall through to light */
      }
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"
    />
    <title>Privacy Notice</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body class="privacy-page">
    <main class="privacy-card">
      <header class="privacy-card-header">
        <h1 id="privacy-heading" data-i18n="privacy.title">&nbsp;</h1>
        <a class="privacy-back" href="settings.html" data-i18n="licenses.back">&nbsp;</a>
      </header>

      <p id="privacy-intro" class="privacy-intro" data-i18n="privacy.intro">&nbsp;</p>

      <section class="privacy-section" id="privacy-controller-section">
        <h2 data-i18n="privacy.controller.heading">&nbsp;</h2>
        <div id="privacy-controller-content"></div>
      </section>

      <section class="privacy-section" id="privacy-data-section">
        <h2 data-i18n="privacy.data.heading">&nbsp;</h2>
        <div id="privacy-data-content"></div>
      </section>

      <section class="privacy-section" id="privacy-retention-section">
        <h2 data-i18n="privacy.retention.heading">&nbsp;</h2>
        <div id="privacy-retention-content"></div>
      </section>

      <section class="privacy-section" id="privacy-rights-section">
        <h2 data-i18n="privacy.rights.heading">&nbsp;</h2>
        <div id="privacy-rights-content"></div>
      </section>

      <section class="privacy-section" id="privacy-ttdsg-section">
        <h2 data-i18n="privacy.ttdsg.heading">&nbsp;</h2>
        <div id="privacy-ttdsg-content"></div>
      </section>

      <section class="privacy-section" id="privacy-betriebsrat-section">
        <h2 data-i18n="privacy.betriebsrat.heading">&nbsp;</h2>
        <div id="privacy-betriebsrat-content"></div>
      </section>
    </main>

    <script type="module" src="js/privacy.js"></script>
  </body>
</html>
