<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Feature 030: apply dark theme on first paint, before any stylesheet
      // loads. Must remain inline so it runs before the browser paints.
      try {
        var t = localStorage.getItem('redmine_calendar_theme');
        if (t === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch (e) {
        /* localStorage unavailable — fall through to light */
      }
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"
    />
    <title>Redmine Calendar</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="app-header">
      <img class="brand-logo" alt="" hidden />
      <h1 class="app-title">Redmine Calendar</h1>
      <span id="mobile-date"></span>
      <span id="week-total" class="week-total"></span>
      <button class="docs-help-btn" aria-label="">?</button>
      <button class="chatbot-open-btn" aria-label="">&#10024;</button>
      <a href="settings.html" class="settings-link" title="" aria-label=""
        ><span aria-hidden="true">&#9881;</span></a
      >
    </header>

    <main id="calendar-main">
      <div id="error-banner" class="error-banner hidden">
        <span id="error-message"></span>
        <a id="error-settings-link" href="settings.html?expired=1" class="btn-retry hidden"
          >Go to Settings</a
        >
        <button id="error-retry" class="btn-retry">Retry</button>
        <button id="error-dismiss" class="btn-dismiss">&#10005;</button>
      </div>

      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
      </div>

      <div id="clipboard-banner" class="clipboard-banner hidden">
        <span id="clipboard-banner-text"></span>
        <button id="clipboard-banner-clear" aria-label="">✕</button>
      </div>

      <div id="calendar"></div>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"
      integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"
      integrity="sha384-qJNkHwhlYywDHfyoEe1np+1lYvX/8x+3gHCKFhSSBMQyCFlvFnn+zXmaebXl21rV"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"
      integrity="sha384-cdgKlW4XCZfQ8yQFLScLHBujFrHf3sMYBPBjRimt2H/ut44fe4t/PUk3luazptar"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.20/locales-all.global.min.js"
      integrity="sha384-Z5jJROVCX/GTtyM3gOeOA56HZgN5Tar/vCkd0t77ahwyWwAY4RzEnlKjTXgkpLQ4"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.39.0/lib/msal-browser.min.js"
      integrity="sha384-HtsDY8wVihpnviltxuJhKpX0ahqMUgvnzrXcW39KBNui4JooW+YJb1YxvQmNoFDZ"
      crossorigin="anonymous"
    ></script>
    <script type="module">
      import { t } from './js/i18n.js';
      const settingsLink = document.querySelector('.settings-link');
      if (settingsLink) {
        const settingsTitle = t('page.settings_title');
        settingsLink.title = settingsTitle;
        settingsLink.setAttribute('aria-label', settingsTitle);
      }
      document.getElementById('error-settings-link').textContent = t('page.go_to_settings');
      document.getElementById('error-retry').textContent = t('page.retry');
      document.querySelector('.docs-help-btn')?.setAttribute('aria-label', t('docs.open_btn'));
      document
        .querySelector('.chatbot-open-btn')
        ?.setAttribute('aria-label', t('chatbot.open_btn'));
      document
        .getElementById('clipboard-banner-clear')
        ?.setAttribute('aria-label', t('calendar.clipboard_clear_aria'));
      document.getElementById('docs-panel')?.setAttribute('aria-label', t('docs.panel_title'));
      document
        .querySelector('#docs-panel .docs-panel__close')
        ?.setAttribute('aria-label', t('docs.close_btn'));
      document
        .getElementById('chatbot-panel')
        ?.setAttribute('aria-label', t('chatbot.panel_title'));
      document
        .querySelector('#chatbot-panel .chatbot-panel__close')
        ?.setAttribute('aria-label', t('a11y.chatbot.close'));
      document.getElementById('chatbot-audio-btn')?.setAttribute('aria-label', t('voice.start'));
      const chatbotInputLabel = document.getElementById('chatbot-input-label');
      if (chatbotInputLabel) chatbotInputLabel.textContent = t('chatbot.input_placeholder');
    </script>
    <script type="module" src="js/calendar.js"></script>
    <div id="docs-panel" class="docs-panel" role="dialog" aria-modal="false" aria-label="" hidden>
      <div class="docs-panel__resize"></div>
      <div class="docs-panel__header">
        <h2 class="docs-panel__title"></h2>
        <button class="docs-panel__close" aria-label="">&#10005;</button>
      </div>
      <div class="docs-panel__body" id="docs-panel-body"></div>
    </div>

    <div
      id="chatbot-panel"
      class="chatbot-panel"
      role="dialog"
      aria-modal="false"
      aria-label=""
      hidden
    >
      <div class="chatbot-panel__resize"></div>
      <div class="chatbot-panel__header">
        <h2 class="chatbot-panel__title"></h2>
        <button class="chatbot-panel__close" aria-label="">&#10005;</button>
      </div>
      <div class="chatbot-messages" id="chatbot-messages" aria-live="polite"></div>
      <div class="chatbot-input-area">
        <label for="chatbot-input" class="visually-hidden" id="chatbot-input-label"></label>
        <textarea id="chatbot-input" rows="1" aria-labelledby="chatbot-input-label"></textarea>
        <button id="chatbot-audio-btn" class="chatbot-audio-btn" aria-label="" type="button" hidden>
          <span aria-hidden="true">🎤</span>
        </button>
        <button class="chatbot-send-btn" type="button"></button>
      </div>
    </div>

    <div id="arbzg-tooltip" role="tooltip"></div>
    <script type="module" src="js/docs.js"></script>
    <script type="module" src="js/chatbot.js"></script>
  </body>
</html>
