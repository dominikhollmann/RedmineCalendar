<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Baseline CSP (defense-in-depth, issue #117).
      connect-src is intentionally absent here — it depends on admin-configured
      proxy URLs (redmineUrl, aiProxyUrl) and must be set as a server-side
      header. See the "Content Security Policy" section in README.md.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'sha256-f7b1YAOPSc0ietZktOxGbxW1keQBQjgFgS4S1ioVfsY='; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; object-src 'none'; base-uri 'self';"
    />
    <script>
      // Feature 030: apply dark theme on first paint, before any stylesheet
      // loads. Must remain inline so it runs before the browser paints.
      try {
        var t = localStorage.getItem('redmine_calendar_theme');
        if (t === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch (e) {
        /* localStorage unavailable — fall through to light */
      }
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"
    />
    <title>Redmine Calendar</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/calendar.css" />
    <link rel="stylesheet" href="css/time-entry.css" />
    <link rel="stylesheet" href="css/docs.css" />
    <link rel="stylesheet" href="css/settings.css" />
  </head>
  <body>
    <header class="app-header">
      <img class="brand-logo" alt="" hidden />
      <h1 class="app-title">Redmine Calendar</h1>
      <span id="mobile-date"></span>
      <span id="week-total" class="week-total"></span>
      <button class="docs-help-btn" aria-label="">?</button>
      <button class="chatbot-open-btn" aria-label="">&#10024;</button>
      <a href="settings.html" class="settings-link" title="" aria-label=""
        ><span aria-hidden="true">&#9881;</span></a
      >
    </header>

    <main id="calendar-main">
      <div id="error-banner" class="error-banner hidden">
        <span id="error-message"></span>
        <a id="error-settings-link" href="settings.html?expired=1" class="btn-retry hidden"
          >Go to Settings</a
        >
        <button id="error-retry" class="btn-retry">Retry</button>
        <button id="error-dismiss" class="btn-dismiss">&#10005;</button>
      </div>

      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
      </div>

      <div id="clipboard-banner" class="clipboard-banner hidden">
        <span id="clipboard-banner-text"></span>
        <button id="clipboard-banner-clear" aria-label="">✕</button>
      </div>

      <div id="calendar"></div>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.20/locales-all.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.39.0/lib/msal-browser.min.js"></script>
    <script type="module" src="js/page-init.js"></script>
    <script type="module" src="js/calendar.js"></script>
    <div id="docs-panel" class="docs-panel" role="dialog" aria-modal="false" aria-label="" hidden>
      <div class="docs-panel__resize"></div>
      <div class="docs-panel__header">
        <h2 class="docs-panel__title"></h2>
        <button class="docs-panel__close" aria-label="">&#10005;</button>
      </div>
      <div class="docs-panel__body" id="docs-panel-body"></div>
    </div>

    <div
      id="chatbot-panel"
      class="chatbot-panel"
      role="dialog"
      aria-modal="false"
      aria-label=""
      hidden
    >
      <div class="chatbot-panel__resize"></div>
      <div class="chatbot-panel__header">
        <h2 class="chatbot-panel__title"></h2>
        <button class="chatbot-panel__close" aria-label="">&#10005;</button>
      </div>
      <div class="chatbot-messages" id="chatbot-messages" aria-live="polite"></div>
      <div class="chatbot-input-area">
        <label for="chatbot-input" class="visually-hidden" id="chatbot-input-label"></label>
        <textarea id="chatbot-input" rows="1" aria-labelledby="chatbot-input-label"></textarea>
        <button id="chatbot-audio-btn" class="chatbot-audio-btn" aria-label="" type="button" hidden>
          <span aria-hidden="true">🎤</span>
        </button>
        <button class="chatbot-send-btn" type="button"></button>
      </div>
    </div>

    <div id="arbzg-tooltip" role="tooltip"></div>
    <script type="module" src="js/docs.js"></script>
    <script type="module" src="js/chatbot.js"></script>
  </body>
</html>
