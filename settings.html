<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Baseline CSP (defense-in-depth, issue #117).
      connect-src is intentionally absent here — it depends on admin-configured
      proxy URLs (redmineUrl, aiProxyUrl) and must be set as a server-side
      header. See the "Content Security Policy" section in README.md.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'sha256-f7b1YAOPSc0ietZktOxGbxW1keQBQjgFgS4S1ioVfsY='; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; object-src 'none'; base-uri 'self';"
    />
    <script>
      // Feature 030: apply dark theme on first paint, before any stylesheet
      // loads. Must remain inline so it runs before the browser paints.
      try {
        var t = localStorage.getItem('redmine_calendar_theme');
        if (t === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch (e) {
        /* localStorage unavailable — fall through to light */
      }
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"
    />
    <title>Redmine Calendar</title>
    <link rel="stylesheet" href="css/base.css" />
    <!-- Provides the shared .anomaly-tooltip styles reused by the settings hint tooltips. -->
    <link rel="stylesheet" href="css/calendar-overlays.css" />
    <link rel="stylesheet" href="css/docs.css" />
    <link rel="stylesheet" href="css/feedback.css" />
    <link rel="stylesheet" href="css/settings.css" />
  </head>
  <body class="settings-page">
    <main class="settings-card">
      <header class="settings-card-header">
        <img class="brand-logo" alt="" hidden />
        <h1 id="settings-heading">&nbsp;</h1>
        <button class="docs-help-btn" aria-label="">?</button>
      </header>

      <div id="config-error" class="config-error hidden"></div>

      <!-- First-time welcome banner (hidden for returning users) -->
      <div id="first-time-banner" class="first-time-banner hidden">
        <p id="first-time-intro"></p>
        <p id="first-time-instructions"></p>
      </div>

      <div id="settings-error" class="inline-error hidden"></div>

      <form id="settings-form" novalidate>
        <h2 class="form-section-heading">&nbsp;</h2>
        <label class="settings-toggle">
          <input type="checkbox" id="settingWorkingHours" />
          <span id="label-working-hours">&nbsp;</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox" id="settingWorkweek" />
          <span id="label-workweek">&nbsp;</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox" id="settingDarkMode" />
          <span id="label-dark-mode">&nbsp;</span>
        </label>
        <label class="settings-toggle" id="fast-mode-toggle">
          <input type="checkbox" id="settingFastMode" />
          <span id="label-fast-mode">&nbsp;</span>
        </label>

        <h2 class="form-section-heading">&nbsp;</h2>
        <div class="modal-row">
          <div>
            <label for="workStart">&nbsp;</label>
            <input type="time" id="workStart" name="workStart" />
          </div>
          <div>
            <label for="workEnd">&nbsp;</label>
            <input type="time" id="workEnd" name="workEnd" />
          </div>
        </div>
        <p class="settings-hint" data-spacing="md-bottom">&nbsp;</p>
        <div id="workhours-error" class="inline-error hidden"></div>

        <div class="modal-row">
          <div>
            <label for="weeklyHours" id="label-weekly-hours">&nbsp;</label>
            <input
              type="number"
              id="weeklyHours"
              name="weeklyHours"
              min="1"
              max="60"
              step="0.5"
              placeholder="40"
            />
          </div>
        </div>
        <p class="settings-hint" id="hint-weekly-hours" data-spacing="md-bottom">&nbsp;</p>

        <h2 class="form-section-heading">&nbsp;</h2>
        <div class="auth-toggle">
          <label class="auth-option">
            <input type="radio" name="authType" value="apikey" checked />
            &nbsp;
          </label>
          <label class="auth-option">
            <input type="radio" name="authType" value="basic" />
            &nbsp;
          </label>
        </div>

        <div id="field-apikey">
          <label for="apiKey">&nbsp;</label>
          <div class="password-field">
            <input type="password" id="apiKey" name="apiKey" autocomplete="off" />
            <button type="button" class="password-toggle" data-target="apiKey"></button>
          </div>
          <p class="settings-hint" data-spacing="sm-top">
            <span id="apikey-hint-text"></span>
            <a
              class="redmine-account-link"
              href="#"
              target="_blank"
              rel="noopener"
              id="redmine-account-link"
            ></a>
          </p>
        </div>

        <div id="field-basic" class="hidden">
          <label for="username">&nbsp;</label>
          <input type="text" id="username" name="username" autocomplete="username" />
          <label for="password">&nbsp;</label>
          <div class="password-field">
            <input type="password" id="password" name="password" autocomplete="current-password" />
            <button type="button" class="password-toggle" data-target="password"></button>
          </div>
        </div>

        <h2 class="form-section-heading" id="planning-sources-heading">&nbsp;</h2>
        <label class="settings-toggle">
          <input type="checkbox" id="settingPlanningSourceOutlook" />
          <span id="label-planning-source-outlook">&nbsp;</span>
        </label>
        <label class="settings-toggle">
          <input
            type="checkbox"
            id="settingPlanningSourceTeams"
            data-testid="teams-source-toggle"
          />
          <span id="label-planning-source-teams">&nbsp;</span>
        </label>

        <div class="modal-row">
          <div>
            <label for="autoRefreshInterval" id="label-auto-refresh-interval">&nbsp;</label>
            <input
              type="number"
              id="autoRefreshInterval"
              name="autoRefreshInterval"
              min="0"
              max="1440"
              step="1"
              placeholder="5"
            />
          </div>
        </div>

        <button type="submit" id="save-btn" class="btn-primary">&nbsp;</button>
      </form>

      <div id="voice-consent-section" class="settings-privacy-row hidden">
        <span id="voice-consent-label"></span>
        <button type="button" id="voice-consent-reset-btn" class="btn-secondary btn-sm"></button>
        <span id="voice-consent-done" class="inline-success hidden"></span>
      </div>

      <!-- Feature 044 / US2: Delete planning data -->
      <div class="settings-delete-section">
        <h2 id="delete-data-heading" data-i18n="settings.deleteData.heading"></h2>
        <p
          id="delete-data-description"
          data-i18n="settings.deleteData.description"
          class="settings-hint"
        ></p>
        <button
          type="button"
          id="delete-planning-data-btn"
          class="btn-secondary btn-sm"
          data-i18n="settings.deleteData.button"
        ></button>
      </div>

      <!-- Feature 044 / US3: AI consent withdrawal and Art. 15 data viewer -->
      <div class="settings-consent-section">
        <h2 id="consent-section-heading" data-i18n="settings.consent.heading"></h2>
        <p id="consent-status" class="settings-consent-status"></p>
        <button
          type="button"
          id="grant-consent-btn"
          class="btn-secondary btn-sm hidden"
          data-i18n="settings.consent.grant"
        ></button>
        <button
          type="button"
          id="withdraw-consent-btn"
          class="btn-secondary btn-sm hidden"
          data-i18n="settings.consent.withdraw"
        ></button>
      </div>

      <details class="planning-data-viewer" id="planning-data-viewer">
        <summary data-i18n="settings.dataViewer.heading"></summary>
        <div id="planning-data-content"></div>
      </details>

      <p id="app-version" class="version-display"></p>

      <footer class="settings-footer">
        <a href="licenses.html" data-i18n="licenses.link"></a>
        &nbsp;·&nbsp;
        <a href="privacy.html" data-i18n="privacy.link"></a>
      </footer>
    </main>

    <script type="module" src="js/settings-page.js"></script>
    <script type="module" src="js/feedback.js"></script>
    <div id="docs-panel" class="docs-panel" role="dialog" aria-modal="false" aria-label="" hidden>
      <div class="docs-panel__resize"></div>
      <div class="docs-panel__header">
        <h2 class="docs-panel__title"></h2>
        <button class="docs-panel__close" aria-label="">&#10005;</button>
      </div>
      <div class="docs-panel__body" id="docs-panel-body"></div>
    </div>

    <script type="module" src="js/docs.js"></script>
    <script type="module" src="js/settings.js"></script>
  </body>
</html>
