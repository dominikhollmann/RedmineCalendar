<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redmine Calendar – Settings</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="settings-page">
  <div class="settings-card">
    <h1>Redmine Calendar Settings</h1>
    <p class="settings-hint">
      The proxy URL is <code>http://localhost:8010</code> when using
      <code>local-cors-proxy</code>.
    </p>

    <div id="settings-error" class="inline-error hidden"></div>
    <div id="settings-expired" class="inline-error hidden">
      Session expired — please re-enter your credentials.
    </div>

    <form id="settings-form" novalidate>
      <label for="redmineUrl">Redmine proxy URL</label>
      <input
        type="url"
        id="redmineUrl"
        name="redmineUrl"
        placeholder="http://localhost:8010"
        required
        autocomplete="off"
      />

      <label>Authentication method</label>
      <div class="auth-toggle">
        <label class="auth-option">
          <input type="radio" name="authType" value="apikey" checked />
          API Key
        </label>
        <label class="auth-option">
          <input type="radio" name="authType" value="basic" />
          Username &amp; Password
        </label>
      </div>

      <div id="field-apikey">
        <label for="apiKey">API key</label>
        <input
          type="password"
          id="apiKey"
          name="apiKey"
          placeholder="Your Redmine API key"
          autocomplete="off"
        />
        <p class="settings-hint" style="margin-top:.4rem;">
          Find it under <em>My Account → API access key</em> in Redmine.
        </p>
      </div>

      <div id="field-basic" class="hidden">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Your Redmine login"
          autocomplete="username"
        />
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Your Redmine password"
          autocomplete="current-password"
        />
      </div>

      <label>Working hours</label>
      <div class="modal-row">
        <div>
          <label for="workStart">Start</label>
          <input type="time" id="workStart" name="workStart" />
        </div>
        <div>
          <label for="workEnd">End</label>
          <input type="time" id="workEnd" name="workEnd" />
        </div>
      </div>
      <p class="settings-hint" style="margin-bottom:.75rem;">
        Leave both fields empty to disable the working hours view.
      </p>
      <div id="workhours-error" class="inline-error hidden"></div>

      <button type="submit" id="save-btn" class="btn-primary">Save &amp; Connect</button>
    </form>
  </div>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
