<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Baseline CSP (defense-in-depth, issue #117).
      connect-src is intentionally absent here — it depends on admin-configured
      proxy URLs (redmineUrl, aiProxyUrl) and must be set as a server-side
      header. See the "Content Security Policy" section in README.md.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'sha256-f7b1YAOPSc0ietZktOxGbxW1keQBQjgFgS4S1ioVfsY='; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; object-src 'none'; base-uri 'self';"
    />
    <script>
      // Feature 030: apply dark theme on first paint, before any stylesheet
      // loads. Must remain inline so it runs before the browser paints.
      try {
        var t = localStorage.getItem('redmine_calendar_theme');
        if (t === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch (e) {
        /* localStorage unavailable — fall through to light */
      }
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"
    />
    <title>Redmine Calendar</title>
    <link rel="stylesheet" href="css/base.css" />
    <!-- Provides the shared .anomaly-tooltip styles reused by the settings hint tooltips. -->
    <link rel="stylesheet" href="css/calendar-overlays.css" />
    <link rel="stylesheet" href="css/docs.css" />
    <link rel="stylesheet" href="css/feedback.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <link rel="stylesheet" href="css/settings-data.css" />
  </head>
  <body class="settings-page">
    <div class="settings-wrap">
      <!-- ── Header: app mark, title, help, theme toggle ───────────── -->
      <header class="settings-header">
        <div class="settings-header-brand">
          <img class="brand-logo" alt="" hidden />
          <span class="brand-mark" aria-hidden="true">RC</span>
          <div class="settings-header-title">
            <h1 id="settings-heading" class="settings-title">&nbsp;</h1>
            <p id="settings-subtitle" class="settings-subtitle">&nbsp;</p>
          </div>
        </div>
        <div class="settings-header-actions">
          <button type="button" class="docs-help-btn" aria-label="">?</button>
          <button type="button" id="theme-toggle" class="theme-toggle" aria-label="">
            <span class="theme-toggle-icon" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <div class="settings-body">
        <!-- ── Section navigation (rail desktop / chip-bar mobile) ───── -->
        <nav id="settings-nav" class="settings-nav" aria-label=""></nav>

        <!-- ── Card column ───────────────────────────────────────────── -->
        <main class="settings-card-column">
          <div id="config-error" class="config-error hidden"></div>

          <!-- First-time welcome banner (hidden for returning users) -->
          <div id="first-time-banner" class="first-time-banner hidden">
            <p id="first-time-intro"></p>
            <p id="first-time-instructions"></p>
          </div>

          <!-- ── Display ──────────────────────────────────────────── -->
          <section id="section-display" class="settings-section" aria-labelledby="heading-display">
            <h2 id="heading-display" class="settings-section-title">&nbsp;</h2>
            <div class="switch-row">
              <span id="label-working-hours" class="switch-label">&nbsp;</span>
              <button
                type="button"
                id="settingWorkingHours"
                class="switch"
                role="switch"
                aria-checked="false"
                aria-labelledby="label-working-hours"
              ></button>
            </div>
            <div class="switch-row">
              <span id="label-workweek" class="switch-label">&nbsp;</span>
              <button
                type="button"
                id="settingWorkweek"
                class="switch"
                role="switch"
                aria-checked="false"
                aria-labelledby="label-workweek"
              ></button>
            </div>
            <div class="switch-row" id="fast-mode-toggle">
              <span id="label-fast-mode" class="switch-label">&nbsp;</span>
              <button
                type="button"
                id="settingFastMode"
                class="switch"
                role="switch"
                aria-checked="false"
                aria-labelledby="label-fast-mode"
              ></button>
            </div>
          </section>

          <!-- ── Working hours ────────────────────────────────────── -->
          <section
            id="section-working-hours"
            class="settings-section"
            aria-labelledby="heading-working-hours"
          >
            <h2 id="heading-working-hours" class="settings-section-title">&nbsp;</h2>
            <div class="modal-row work-hours-row">
              <div>
                <label for="workStart">&nbsp;</label>
                <input type="time" id="workStart" name="workStart" />
              </div>
              <div>
                <label for="workEnd">&nbsp;</label>
                <input type="time" id="workEnd" name="workEnd" />
              </div>
            </div>
            <p class="settings-hint" data-spacing="md-bottom">&nbsp;</p>
            <div id="workhours-error" class="inline-error hidden"></div>

            <div class="weekly-hours-row">
              <label for="weeklyHours" id="label-weekly-hours">&nbsp;</label>
              <input
                type="number"
                id="weeklyHours"
                name="weeklyHours"
                min="0"
                max="60"
                step="0.5"
                value="40"
                placeholder="40"
                autocomplete="off"
                aria-describedby="weekly-hours-error"
              />
              <div id="weekly-hours-error" class="inline-error hidden" role="alert"></div>
            </div>
            <p class="settings-hint" id="hint-weekly-hours" data-spacing="md-bottom">&nbsp;</p>
          </section>

          <!-- ── Authentication ───────────────────────────────────── -->
          <section id="section-auth" class="settings-section" aria-labelledby="heading-auth">
            <div class="settings-section-head">
              <h2 id="heading-auth" class="settings-section-title">&nbsp;</h2>
              <span id="conn-status" class="conn-pill" data-state="disconnected"></span>
            </div>

            <div id="settings-error" class="inline-error hidden"></div>

            <div class="segmented" role="radiogroup" id="auth-segmented">
              <label class="segmented-option">
                <input type="radio" name="authType" value="apikey" checked />
                <span></span>
              </label>
              <label class="segmented-option">
                <input type="radio" name="authType" value="basic" />
                <span></span>
              </label>
            </div>

            <div id="field-apikey">
              <label for="apiKey">&nbsp;</label>
              <div class="password-field">
                <input type="password" id="apiKey" name="apiKey" autocomplete="off" />
                <button type="button" class="password-toggle" data-target="apiKey"></button>
              </div>
              <p class="settings-hint" data-spacing="sm-top">
                <span id="apikey-hint-text"></span>
                <a
                  class="redmine-account-link"
                  href="#"
                  target="_blank"
                  rel="noopener"
                  id="redmine-account-link"
                ></a>
              </p>
            </div>

            <div id="field-basic" class="hidden">
              <label for="username">&nbsp;</label>
              <input type="text" id="username" name="username" autocomplete="username" />
              <label for="password">&nbsp;</label>
              <div class="password-field">
                <input
                  type="password"
                  id="password"
                  name="password"
                  autocomplete="current-password"
                />
                <button type="button" class="password-toggle" data-target="password"></button>
              </div>
            </div>

            <p id="conn-hint" class="conn-hint inline-error hidden"></p>
            <button type="button" id="connect-btn" class="btn-primary settings-connect-btn">
              &nbsp;
            </button>
          </section>

          <!-- ── Sources ──────────────────────────────────────────── -->
          <section id="section-sources" class="settings-section" aria-labelledby="heading-sources">
            <h2 id="heading-sources" class="settings-section-title">&nbsp;</h2>
            <p id="sources-help" class="settings-hint" data-spacing="md-bottom">&nbsp;</p>
            <div id="source-list" class="source-list" role="list"></div>

            <div class="auto-refresh-row">
              <label for="autoRefreshInterval" class="auto-refresh-label">
                <span id="label-auto-refresh-interval">&nbsp;</span>
                <span id="sublabel-auto-refresh" class="auto-refresh-sublabel">&nbsp;</span>
              </label>
              <input
                type="number"
                id="autoRefreshInterval"
                name="autoRefreshInterval"
                class="auto-refresh-input"
                min="0"
                max="1440"
                step="1"
                placeholder="5"
              />
            </div>
          </section>

          <!-- ── Data & privacy (danger zone) ─────────────────────── -->
          <section
            id="section-data"
            class="settings-section danger-zone"
            aria-labelledby="heading-data"
          >
            <h2 id="heading-data" class="settings-section-title">&nbsp;</h2>

            <!-- Privacy link (first row, above the danger divider) -->
            <div class="danger-row danger-row--privacy">
              <span
                class="danger-row-label"
                id="privacy-row-label"
                data-i18n="settings.privacy_row_label"
              ></span>
              <a href="privacy.html" id="privacy-policy-link"></a>
            </div>

            <!-- Feature 044 / US2 + US3: Delete planning data, with the
                 Art. 15 data viewer grouped in the same section (no divider
                 between them) — both relate to "Planungsdaten". -->
            <div class="danger-row-group">
              <div class="danger-row">
                <span
                  class="danger-row-label"
                  id="delete-data-heading"
                  data-i18n="settings.deleteData.heading"
                ></span>
                <button
                  type="button"
                  id="delete-planning-data-btn"
                  class="btn-outline-danger"
                  data-i18n="settings.deleteData.button"
                ></button>
              </div>

              <details class="planning-data-viewer" id="planning-data-viewer">
                <summary data-i18n="settings.dataViewer.heading"></summary>
                <div id="planning-data-content"></div>
              </details>
            </div>

            <!-- Feature 044 / US3: AI consent withdrawal -->
            <div class="danger-row">
              <span class="danger-row-label">
                <span id="consent-section-heading" data-i18n="settings.consent.heading"></span>
                <span id="consent-status" class="danger-row-sublabel"></span>
              </span>
              <span class="danger-row-actions">
                <button
                  type="button"
                  id="grant-consent-btn"
                  class="btn-secondary btn-sm hidden"
                  data-i18n="settings.consent.grant"
                ></button>
                <button
                  type="button"
                  id="withdraw-consent-btn"
                  class="btn-outline-danger hidden"
                  data-i18n="settings.consent.withdraw"
                ></button>
              </span>
            </div>

            <!-- Voice consent reset (conditional, SEC-009) -->
            <div id="voice-consent-section" class="danger-row hidden">
              <span class="danger-row-label" id="voice-consent-label"></span>
              <span class="danger-row-actions">
                <button
                  type="button"
                  id="voice-consent-reset-btn"
                  class="btn-secondary btn-sm"
                ></button>
                <span id="voice-consent-done" class="inline-success hidden"></span>
              </span>
            </div>
          </section>

          <!-- Footer line: "Version: dev · Open-Source-Lizenzen" -->
          <p class="settings-footer-line">
            <span id="app-version"></span>
            <span aria-hidden="true"> · </span>
            <a href="licenses.html" data-i18n="licenses.link"></a>
          </p>
        </main>
      </div>

      <!-- ── Sticky footer (in-column): connection-gated app entry ── -->
      <footer class="settings-sticky-footer">
        <p id="footer-hint" class="settings-footer-hint"></p>
        <button type="button" id="open-calendar-btn" class="btn-primary" disabled>&nbsp;</button>
      </footer>

      <!-- a11y live region for connection + reorder announcements -->
      <div id="settings-live" class="visually-hidden" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="js/settings.js"></script>
    <script type="module" src="js/settings-page.js"></script>
    <script type="module" src="js/feedback.js"></script>
    <div id="docs-panel" class="docs-panel" role="dialog" aria-modal="false" aria-label="" hidden>
      <div class="docs-panel__resize"></div>
      <div class="docs-panel__header">
        <h2 class="docs-panel__title"></h2>
        <button class="docs-panel__close" aria-label="">&#10005;</button>
      </div>
      <div class="docs-panel__body" id="docs-panel-body"></div>
    </div>

    <script type="module" src="js/docs.js"></script>
  </body>
</html>
