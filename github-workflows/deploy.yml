name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate config.json for staging
        run: |
          cat > config.json << 'CONF'
          {
            "redmineUrl": "${{ vars.REDMINE_PROXY_URL }}",
            "redmineServerUrl": "${{ vars.REDMINE_SERVER_URL }}",
            "aiProvider": "${{ vars.AI_PROVIDER }}",
            "aiModel": "${{ vars.AI_MODEL }}",
            "aiApiKey": "${{ secrets.AI_API_KEY }}",
            "aiProxyUrl": "${{ vars.AI_PROXY_URL }}"
          }
          CONF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
