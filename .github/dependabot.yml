version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    groups:
      # Bundle dev-tooling bumps into one PR so the inbox stays sane.
      dev-tooling:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
          - 'htmlhint'
          - 'globals'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@playwright/*'
          - 'monocart-coverage-reports'
          - 'madge'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
