version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    groups:
      # Bundle dev-tooling bumps into one PR so the inbox stays sane.
      dev-tooling:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
          - 'htmlhint'
          - 'globals'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@playwright/*'
          - 'monocart-coverage-reports'
          - 'madge'
    ignore:
      # TypeScript major bumps need manual review: madge@8 has a peer dep on
      # typescript@^5.4.4, so a TS 6 bump fails npm install. Re-enable when
      # madge releases a TS 6-compatible version (or we drop madge from the
      # SQI cycle-detection metric).
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
