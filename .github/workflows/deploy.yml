name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'js/**'
      - 'css/**'
      - '*.html'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'config.json.example'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

          MERGE_MSG=$(git log -1 --pretty=%s)
          if echo "$MERGE_MSG" | grep -qiE '^merge|^feat'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $NEW_VERSION"

      - name: Create version.json
        run: echo '{"version":"${{ steps.version.outputs.version }}"}' > version.json

      - name: Generate config.json for staging
        run: |
          cat > config.json << 'CONF'
          {
            "redmineUrl": "${{ vars.REDMINE_PROXY_URL }}",
            "redmineServerUrl": "${{ vars.REDMINE_SERVER_URL }}",
            "aiProvider": "${{ vars.AI_PROVIDER }}",
            "aiModel": "${{ vars.AI_MODEL }}",
            "aiApiKey": "${{ secrets.AI_API_KEY }}",
            "aiProxyUrl": "${{ vars.AI_PROXY_URL }}"
          }
          CONF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Update BACKLOG.md version column
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git fetch origin main
          git checkout main -- BACKLOG.md
          # Fill empty version cells for done features using awk (handles Unicode)
          # Markdown table: "| ... | Version |" — version is $(NF-1), $NF is empty after trailing |
          awk -v ver="v${VERSION}" -F'|' '
            /\*\*done\*\*/ {
              v = $(NF-1)
              gsub(/[[:space:]]/, "", v)
              if (v == "") {
                $(NF-1) = " " ver " "
                print
                next
              }
            }
            { print }
          ' OFS="|" BACKLOG.md > BACKLOG.md.tmp && mv BACKLOG.md.tmp BACKLOG.md
          if ! git diff --quiet BACKLOG.md; then
            git add BACKLOG.md
            git commit -m "chore: set version v${VERSION} for completed features in backlog"
            git push origin HEAD:main
          fi
