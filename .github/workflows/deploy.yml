name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'js/**'
      - 'css/**'
      - '*.html'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'config.json.example'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high
      - name: Lint and format check
        run: npm run lint && npm run format:check && npm run htmlhint && npm run typecheck
      - run: npm run test:coverage # runs unit tests + enforces coverage thresholds
      - name: Software Quality Index (SQI)
        run: npm run sqi:json
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage/
            coverage/sqi.json
          retention-days: 14
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read latest version tag
        id: version
        run: |
          # release.yml owns version computation + tag push. deploy.yml just
          # reads the latest tag to bake into version.json + config.json.
          # Race window: if deploy.yml races ahead of release.yml on the same
          # merge, version.json gets the PREVIOUS version for ~30 seconds
          # until the next deploy. Acceptable; tagging-twice was worse.
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LATEST_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION (from tag $LATEST_TAG)"

      - name: Create version.json
        run: echo '{"version":"${{ steps.version.outputs.version }}"}' > version.json

      - name: Generate config.json for staging
        run: |
          cat > config.json << 'CONF'
          {
            "redmineUrl": "${{ vars.REDMINE_PROXY_URL }}",
            "redmineServerUrl": "${{ vars.REDMINE_SERVER_URL }}",
            "aiProvider": "${{ vars.AI_PROVIDER }}",
            "aiModel": "${{ vars.AI_MODEL }}",
            "aiApiKey": "${{ secrets.AI_API_KEY }}",
            "aiProxyUrl": "${{ vars.AI_PROXY_URL }}",
            "azureClientId": "${{ vars.AZURE_CLIENT_ID }}",
            "holidayTicket": ${{ vars.HOLIDAY_TICKET || '0' }},
            "vacationTicket": ${{ vars.VACATION_TICKET || '0' }},
            "breakTicket": ${{ vars.BREAK_TICKET || '0' }},
            "redmineAcceptsZeroHours": ${{ vars.REDMINE_ACCEPTS_ZERO_HOURS && 'true' || 'false' }}
          }
          CONF

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5

      # Tagging is now owned by .github/workflows/release.yml (fires on PR
      # merge to main; computes next version + pushes tag + creates milestone
      # + creates Release with auto-generated notes). The previous deploy.yml
      # "Tag release" step race-condition'd with release.yml and produced
      # duplicate tags; removed in PR #86.

      # The previous "Update BACKLOG.md version column" step is gone because
      # BACKLOG.md itself is gone (deleted in feature 032's T028). The same
      # information is now carried by GitHub Issue Milestones — assigned
      # automatically by release.yml at merge time.
