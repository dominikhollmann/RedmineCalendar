name: Regenerate SBoM for Dependabot PRs

on:
  # pull_request_target runs in the base-repo context (not the fork/bot branch),
  # which means GITHUB_TOKEN gets write permissions even for dependabot PRs.
  # pull_request would give a read-only token to dependabot, making the push back fail.
  pull_request_target:
    branches: [main]
    paths:
      - 'package-lock.json'
    types: [opened, synchronize, reopened]

jobs:
  regenerate-sbom:
    runs-on: ubuntu-latest
    # Restrict to dependabot only — guards against misuse of the write token via
    # pull_request_target on arbitrary PRs. Check the PR author (not github.actor)
    # because on synchronize events the actor can differ from the PR opener.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Explicitly check out the PR head branch (not the base), so we regenerate
          # sbom.json against the updated package-lock.json from the dependabot commit.
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Regenerate sbom.json and attributions.json
        run: npm run oss:generate

      - name: Commit updated SBoM artifacts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sbom.json attributions.json
          if git diff --staged --quiet; then
            echo "SBoM artifacts are already up to date."
          else
            git commit -m "chore: regenerate sbom.json and attributions.json after dep bump"
            git push
          fi
