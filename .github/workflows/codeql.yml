name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan to catch newly-published advisories against unchanged code.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
          # Default suite + security-extended catches the high-signal taint
          # rules (XSS, prototype pollution, SSRF) without the noise of -experimental.
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript'
