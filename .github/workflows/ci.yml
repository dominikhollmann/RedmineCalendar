name: CI

on:
  push:
    branches: ['**']
    paths:
      - 'js/**'
      - 'css/**'
      - '*.html'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint, format, HTML, typecheck
        run: npm run lint && npm run format:check && npm run htmlhint && npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # test:coverage (not bare `npm test`) enforces the per-file 95% line
      # threshold. Running it on PRs blocks coverage drift before merge —
      # previously the threshold only fired in deploy.yml on main.
      - run: npm run test:coverage
      # SQI exits non-zero if composite < 60. Same gap-closing rationale as
      # test:coverage above; reads coverage/ output from the previous step.
      - name: Software Quality Index (SQI)
        run: npm run sqi:json

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
