name: CI

on:
  push:
    branches: ['**']
    paths:
      - 'js/**'
      - 'css/**'
      - '*.html'
      - 'tests/**'
      - 'scripts/**'
      - 'deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'scripts/**'
      - '.jscpd.json'
      - 'dup-baseline.json'
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      # Runs against the committed package-lock.json (no node_modules needed),
      # so it fails fast before `npm ci`. Matches the pipeline order documented
      # in CLAUDE.md and Constitution Principle VI (audit is step 1).
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high
      - run: npm ci
      - name: Lint, format, HTML, typecheck
        run: npm run lint && npm run format:check && npm run htmlhint && npm run typecheck
      - name: SRI integrity check (CDN scripts must have integrity attributes)
        run: npm run sri:check
      - name: AI knowledge coverage check
        run: npm run knowledge:check
      - name: Duplicate-code baseline ratchet
        run: npm run dup:check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Feature 034 / US3 (FR-011, FR-013): regenerate sbom.json +
      # attributions.json into a tmp dir and byte-compare against the
      # committed copies. Catches both (a) a dependency edit that wasn't
      # accompanied by `npm run oss:generate` and (b) a hand-edit to the
      # generated files. Fully offline.
      - name: SBoM + attributions drift check
        run: npm run oss:drift
      # Feature 034 / US4 (FR-014..017): SPDX-allowlist gate covering npm
      # + CDN + vendored channels (FR-014 Q3). Fails the PR on any
      # disallowed license unless an exact name@version exemption in
      # oss-allowlist.json approves it with a substantive justification.
      - name: License allowlist check
        run: npm run oss:licenses
      # test:coverage (not bare `npm test`) enforces the per-file 95% line
      # threshold. Running it on PRs blocks coverage drift before merge —
      # previously the threshold only fired in deploy.yml on main.
      - run: npm run test:coverage
      # SQI exits non-zero if composite < 60. Same gap-closing rationale as
      # test:coverage above; reads coverage/ output from the previous step.
      - name: Software Quality Index (SQI)
        run: npm run sqi:json

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
