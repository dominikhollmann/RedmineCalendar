name: Bug report
description: Report a defect in RedmineCalendar
title: '[bug] '
labels: ['bug']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Visible in the footer of the calendar view, or via `version.json`.
      placeholder: e.g. v1.15.4
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other (note in "What happened")
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console output / network errors
      description: Open DevTools and paste any relevant errors.
      render: text
  - type: textarea
    id: env
    attributes:
      label: Environment notes
      description: Anything unusual — Redmine version, custom config, demo mode, intranet vs cloud, etc.
