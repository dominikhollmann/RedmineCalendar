name: Feature request
description: Suggest a new feature or improvement
title: '[feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain point or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the app behave? UI sketches and acceptance criteria help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Will this need a Spec Kit feature flow (`/speckit.specify` → `plan` → `tasks` → `implement` → `uat`)?
      options:
        - Yes — new feature
        - No — small enhancement to existing feature
        - Unsure
    validations:
      required: true
